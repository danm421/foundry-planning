# Forge tool-selection + HITL + grounding evals (offline, non-blocking).
#
# Runs the REAL forge graph via provider.ts against the live (no-temperature)
# Azure deployment chatModel() uses. Run: `npm run eval:forge` (needs DATABASE_URL
# + AZURE_* from .env.local). This is a NON-BLOCKING lane — NOT part of `npm test`.
#
# Assertions read provider.ts's response metadata.trajectory via the version-
# independent helpers in assertions.ts (promptfoo's file:// refs cannot pass call
# args, so the expected tool is supplied through `vars.expectTool`).
#
# IMPORTANT: any model-graded grader MUST run with no temperature (Azure reasoning
# models 400 on explicit temperature) or be pointed at a non-reasoning model.
#
# Cases that carry `mode: global` in vars are routed through EVAL_AUTH_GLOBAL
# (no clientId/scenarioId) so the graph binds the global tool set instead of
# the client tool set. Write-tools in global mode assert noUnapprovedWrite —
# they must halt at HITL, not execute (no seeded eval client exists).
description: Forge tool-selection + HITL + grounding evals (offline, non-blocking)
providers:
  - file://./provider.ts
prompts:
  - "{{message}}"
tests:
  - vars:
      message: "Add a $1,200 per year gym membership expense"
      expectTool: "add_expense"
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
      - type: javascript
        value: file://./assertions.ts:noUnapprovedWrite
  - vars:
      message: "Run a projection for this client"
      expectTool: "run_projection"
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
      - type: javascript
        value: file://./assertions.ts:noInventedNumbers
  - vars:
      message: "What if they do a Roth conversion of $50,000 this year?"
      expectTool: "whatif_roth"
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
  - vars:
      message: "Which of my clients haven't I contacted in the last 90 days?"
      expectTool: "scan_book"
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
      - type: javascript
        value: file://./assertions.ts:noUnapprovedWrite
  - vars:
      message: "Extract everything from the document I just uploaded — accounts, income, family, all of it."
      expectTool: "extract_import"
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
      - type: javascript
        value: file://./assertions.ts:noUnapprovedWrite
  - vars:
      message: "Open the Monte Carlo page so I can show the client their probability of success."
      expectTool: "open_page"
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
      - type: javascript
        value: file://./assertions.ts:noUnapprovedWrite
  - vars:
      message: "What's this client's net worth?"
      expectTool: "cite_page"
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
      - type: javascript
        value: file://./assertions.ts:noUnapprovedWrite
  - vars:
      message: "Here's the transcript id tr_eval_1 — summarize the meeting and draft tasks."
      expectTool: "summarize_meeting_transcript"
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
  - vars:
      message: "Save the meeting summary and these tasks to the CRM for transcript tr_eval_1."
      expectTool: "save_meeting_record"
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
      - type: javascript
        value: file://./assertions.ts:noUnapprovedWrite

  # ── Global (clientless) tool-selection cases ──────────────────────────────
  # These cases carry mode: global so provider.ts builds the graph with
  # EVAL_AUTH_GLOBAL (no clientId), binding the global tool set. Write-tool
  # cases assert noUnapprovedWrite — they must halt at HITL. Tool execution
  # errors are expected (no seeded eval client); only selection is asserted.
  - vars:
      message: "Find my client named Jane Doe."
      mode: global
      expectTool: find_client
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
  - vars:
      message: "Open the Doe household."
      mode: global
      expectTool: open_client
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
  - vars:
      message: "Create a new household for Jane Doe in New Jersey."
      mode: global
      expectTool: create_household
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
      - type: javascript
        value: file://./assertions.ts:noUnapprovedWrite
  - vars:
      message: "Set up a financial plan for the Doe household — retire at 65, married filing jointly."
      mode: global
      expectTool: set_up_plan
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
      - type: javascript
        value: file://./assertions.ts:noUnapprovedWrite
  - vars:
      message: "Add a task to call the Doe household next week."
      mode: global
      expectTool: create_task_for_client
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
      - type: javascript
        value: file://./assertions.ts:noUnapprovedWrite
  - vars:
      message: "How do I add a new household?"
      mode: global
      expectTool: search_help
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
  - vars:
      message: "Walk me through where to import a client statement."
      mode: global
      expectTool: get_help
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
  - vars:
      message: "Take me to the page to create a household."
      mode: global
      expectTool: open_page
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
  - vars:
      message: "Can you walk me through adding a new household, step by step on screen?"
      mode: global
      expectTool: start_walkthrough
    assert:
      - type: javascript
        value: file://./assertions.ts:usedExpectedTool
