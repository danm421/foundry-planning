decisions:
  - Scope D for 4b: account transfer + stream termination + filing-status transition + out-of-household transfer ledger. Basis step-up, estate tax, life-insurance payout, and inherited-IRA mechanics are all separate specs.
  - Fallback chain for undisposed accounts: spouse → even split among living children → system-default "Other Heirs" sink. Always emits residual_fallback_fired warning. Tier 1 always fires at first death; tiers 2 and 3 are wired now for 4c.
  - Split mechanic A: when a bequest is fractional or multi-recipient, the source account is removed and synthetic accounts (one per recipient) are created with proportional balance + basis. 100%-single-recipient case mutates in place and preserves the original id.
  - Timing A: death event fires at END of death year (after tax is calculated and ProjectionYear is pushed). MFJ stays for the death year; survivor is single-filer from year+1 onward.
  - Transfer ledger attaches per-year on ProjectionYear.firstDeathTransfers, not at a top-level. Rationale: runProjection returns ProjectionYear[] today and breaking that shape would ripple through every consumer.
  - Lifetime fractional ownership of accounts (e.g., 25% of a business) is orthogonal to 4b and logged as its own future-work item. Today's workaround (enter the owner's share as the account value) is good enough to unblock 4b.

architecture_summary: |
  Single new module src/engine/death-event.ts exports applyFirstDeath(input) -> result.
  Pure function, no I/O. The projection loop calls it at EoY of the death year,
  threads the mutated state (accounts / balances / basis / incomes / liabilities)
  forward, and attaches the transfer ledger + warnings to the death-year
  ProjectionYear row. A thin effectiveFilingStatus(configured, firstDeathYear, year)
  resolver replaces every direct client.filingStatus read in projection.ts so
  post-death years compute tax as single-filer.

